<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trắc Nghiệm – Bài 6: Linh Đạo Hôn Nhân và Gia Đình</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Source+Sans+3:wght@400;500;600&display=swap');

  :root {
    --navy-900: #0A1628;
    --navy-800: #112240;
    --navy-700: #1B3460;
    --navy-600: #254E8A;
    --navy-500: #2E6DB4;
    --navy-400: #4A8FD4;
    --navy-300: #7ABAEF;
    --gold:     #C9A84C;
    --gold-lt:  #E8C97A;
    --white:    #F5F8FF;
    --gray-100: #E8EEF8;
    --gray-300: #B0BDD8;
    --correct:  #1A7A4A;
    --correct-bg: #D4F0E2;
    --wrong:    #9B1C1C;
    --wrong-bg: #FDDCDC;
    --radius:   10px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--navy-900);
    color: var(--white);
    font-family: 'Source Sans 3', sans-serif;
    font-size: 16px;
    line-height: 1.6;
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    background: linear-gradient(135deg, var(--navy-800) 0%, var(--navy-700) 100%);
    border-bottom: 3px solid var(--gold);
    padding: 36px 24px 28px;
    text-align: center;
  }

  .header-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 10px;
  }

  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(22px, 4vw, 34px);
    font-weight: 700;
    color: var(--white);
    line-height: 1.25;
    margin-bottom: 8px;
  }

  header .subtitle {
    font-size: 14px;
    color: var(--gray-300);
    font-style: italic;
  }

  header .verse {
    margin-top: 14px;
    display: inline-block;
    background: rgba(201,168,76,0.12);
    border-left: 3px solid var(--gold);
    padding: 8px 16px;
    font-size: 13px;
    color: var(--gold-lt);
    border-radius: 0 var(--radius) var(--radius) 0;
  }

  /* ── PROGRESS BAR ── */
  .progress-bar-wrap {
    background: var(--navy-800);
    padding: 14px 24px;
    position: sticky;
    top: 0;
    z-index: 10;
    display: flex;
    align-items: center;
    gap: 14px;
    border-bottom: 1px solid var(--navy-600);
  }

  .progress-track {
    flex: 1;
    height: 6px;
    background: var(--navy-600);
    border-radius: 99px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--navy-400), var(--gold));
    border-radius: 99px;
    transition: width 0.4s ease;
    width: 0%;
  }

  .progress-label {
    font-size: 13px;
    color: var(--gray-300);
    white-space: nowrap;
    font-weight: 600;
  }

  /* ── MAIN ── */
  main {
    max-width: 760px;
    margin: 0 auto;
    padding: 32px 20px 60px;
  }

  /* ── QUESTION CARD ── */
  .card {
    background: var(--navy-800);
    border: 1px solid var(--navy-600);
    border-radius: 14px;
    padding: 28px 28px 22px;
    margin-bottom: 20px;
    transition: border-color 0.3s;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--navy-500), var(--navy-400));
    opacity: 0;
    transition: opacity 0.3s;
  }

  .card.answered::before { opacity: 1; }
  .card.answered { border-color: var(--navy-500); }

  .q-number {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--navy-300);
    margin-bottom: 10px;
  }

  .q-text {
    font-family: 'Source Sans 3', sans-serif;
    font-size: 16px;
    font-weight: 600;
    color: var(--white);
    margin-bottom: 18px;
    line-height: 1.5;
  }

  /* ── OPTIONS ── */
  .options { display: flex; flex-direction: column; gap: 10px; }

  .option {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 12px 16px;
    border-radius: var(--radius);
    border: 1.5px solid var(--navy-600);
    background: var(--navy-700);
    cursor: pointer;
    transition: all 0.18s ease;
    text-align: left;
    width: 100%;
    color: var(--white);
    font-family: 'Source Sans 3', sans-serif;
    font-size: 15px;
    line-height: 1.5;
  }

  .option:hover:not(:disabled) {
    border-color: var(--navy-400);
    background: var(--navy-600);
  }

  .option-key {
    display: flex;
    align-items: center;
    justify-content: center;
    min-width: 28px;
    height: 28px;
    border-radius: 50%;
    background: var(--navy-600);
    font-size: 12px;
    font-weight: 700;
    color: var(--navy-300);
    border: 1.5px solid var(--navy-500);
    transition: all 0.18s;
    flex-shrink: 0;
  }

  .option-text { flex: 1; padding-top: 1px; }

  /* States */
  .option.correct {
    background: var(--correct-bg);
    border-color: var(--correct);
    color: #0D3D22;
  }
  .option.correct .option-key {
    background: var(--correct);
    border-color: var(--correct);
    color: #fff;
  }

  .option.wrong {
    background: var(--wrong-bg);
    border-color: var(--wrong);
    color: #5a0d0d;
  }
  .option.wrong .option-key {
    background: var(--wrong);
    border-color: var(--wrong);
    color: #fff;
  }

  .option:disabled { cursor: default; }

  /* ── FEEDBACK ── */
  .feedback {
    margin-top: 12px;
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    display: none;
  }
  .feedback.correct-msg { background: var(--correct-bg); color: var(--correct); display: block; }
  .feedback.wrong-msg   { background: var(--wrong-bg);   color: var(--wrong);   display: block; }

  /* ── RESULTS ── */
  #results {
    display: none;
    background: linear-gradient(135deg, var(--navy-700), var(--navy-800));
    border: 2px solid var(--gold);
    border-radius: 18px;
    padding: 40px 32px;
    text-align: center;
    margin-top: 32px;
  }

  #results h2 {
    font-family: 'Playfair Display', serif;
    font-size: 26px;
    color: var(--gold);
    margin-bottom: 8px;
  }

  .score-ring {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    background: conic-gradient(var(--gold) 0deg, var(--navy-600) 0deg);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 20px auto;
    position: relative;
  }

  .score-ring::before {
    content: '';
    position: absolute;
    width: 92px;
    height: 92px;
    border-radius: 50%;
    background: var(--navy-800);
  }

  .score-number {
    position: relative;
    z-index: 1;
    font-family: 'Playfair Display', serif;
    font-size: 32px;
    font-weight: 700;
    color: var(--white);
  }

  .result-text {
    font-size: 16px;
    color: var(--gray-300);
    margin-bottom: 6px;
  }

  .result-message {
    font-size: 15px;
    color: var(--gold-lt);
    font-style: italic;
    margin-bottom: 28px;
  }

  .btn-retry {
    background: linear-gradient(135deg, var(--navy-500), var(--gold));
    color: #fff;
    border: none;
    padding: 13px 36px;
    border-radius: 99px;
    font-size: 15px;
    font-weight: 700;
    font-family: 'Source Sans 3', sans-serif;
    cursor: pointer;
    letter-spacing: 1px;
    text-transform: uppercase;
    transition: opacity 0.2s;
  }

  .btn-retry:hover { opacity: 0.88; }

  /* ── FOOTER ── */
  footer {
    text-align: center;
    padding: 20px;
    font-size: 12px;
    color: var(--navy-500);
    border-top: 1px solid var(--navy-700);
  }

  @media (max-width: 480px) {
    .card { padding: 20px 16px 16px; }
    .option { font-size: 14px; padding: 10px 12px; }
  }
</style>
</head>

<header>
  <div class="header-label">Giáo Lý Hôn Nhân Công Giáo</div>
  <h1>Bài 6: Linh Đạo Hôn Nhân và Gia Đình</h1>
  <p class="subtitle">30 câu trắc nghiệm ôn tập</p>
  <div class="verse">«Ý muốn của Thiên Chúa là anh em nên thánh» (1 Tx 4, 3)</div>

  <div class="result-message" id="resultMsg"></div>
  <button class="btn-retry" onclick="initQuiz()">Làm lại bài</button>
</div>

<footer>Giáo lý Hôn nhân Công giáo · Bài 6</footer>

const LABELS = ['A', 'B', 'C', 'D'];
let answered = 0;
let score = 0;
let questions = [];

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function buildQuestions() {
  return RAW_QUESTIONS.map(raw => {
    const all = shuffle([raw.correct, ...raw.wrongs]);
    return { q: raw.q, options: all, correctText: raw.correct };
  });
}

function updateProgress() {
  const pct = (answered / questions.length) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = answered + ' / ' + questions.length;
}

function getResultMessage(pct) {
  if (pct === 100) return 'Xuất sắc! Bạn đã nắm vững hoàn toàn bài học.';
  if (pct >= 80)  return 'Rất tốt! Hãy ôn lại những câu còn sai.';
  if (pct >= 60)  return 'Khá tốt! Tiếp tục cố gắng học hỏi thêm.';
  if (pct >= 40)  return 'Cần ôn tập thêm để nắm vững giáo lý.';
  return 'Hãy đọc lại tài liệu và làm bài lần nữa nhé!';
}

function showResults() {
  document.getElementById('quizMain').style.display = 'none';
  const pct = Math.round((score / questions.length) * 100);
  const deg = Math.round((score / questions.length) * 360);
  const ring = document.querySelector('.score-ring');
  ring.style.background = `conic-gradient(var(--gold) ${deg}deg, var(--navy-600) ${deg}deg)`;
  document.getElementById('scoreNum').textContent = score + '/' + questions.length;
  document.getElementById('resultText').textContent = `Bạn trả lời đúng ${score} / ${questions.length} câu (${pct}%)`;
  document.getElementById('resultMsg').textContent = getResultMessage(pct);
  document.getElementById('results').style.display = 'block';
  document.getElementById('results').scrollIntoView({ behavior: 'smooth' });
}

function renderQuiz() {
  const main = document.getElementById('quizMain');
  main.innerHTML = '';
  main.style.display = 'block';
  document.getElementById('results').style.display = 'none';

  questions.forEach((item, qi) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.id = 'card-' + qi;

    const qNum = document.createElement('div');
    qNum.className = 'q-number';
    qNum.textContent = 'Câu ' + String(qi + 1).padStart(2, '0');

    const qText = document.createElement('div');
    qText.className = 'q-text';
    qText.textContent = item.q;

    const opts = document.createElement('div');
    opts.className = 'options';

    item.options.forEach((opt, oi) => {
      const btn = document.createElement('button');
      btn.className = 'option';
      btn.innerHTML = `<span class="option-key">${LABELS[oi]}</span><span class="option-text">${opt}</span>`;
      btn.addEventListener('click', () => handleAnswer(qi, oi, btn, opts, fb));
      opts.appendChild(btn);
    });

    const fb = document.createElement('div');
    fb.className = 'feedback';

    card.appendChild(qNum);
    card.appendChild(qText);
    card.appendChild(opts);
    card.appendChild(fb);
    main.appendChild(card);
  });
}

function handleAnswer(qi, chosenIdx, btn, optsEl, fb) {
  const item = questions[qi];
  const isCorrect = item.options[chosenIdx] === item.correctText;

  // Disable all buttons
  Array.from(optsEl.querySelectorAll('.option')).forEach((b, i) => {
    b.disabled = true;
    if (item.options[i] === item.correctText) b.classList.add('correct');
  });

  if (isCorrect) {
    btn.classList.add('correct');
    fb.className = 'feedback correct-msg';
    fb.textContent = '✓ Chính xác!';
    score++;
  } else {
    btn.classList.add('wrong');
    fb.className = 'feedback wrong-msg';
    fb.textContent = '✗ Chưa đúng. Đáp án đúng đã được tô màu xanh.';
  }

  document.getElementById('card-' + qi).classList.add('answered');
  answered++;
  updateProgress();
  if (answered === questions.length) {
    setTimeout(showResults, 800);
  }
}

function initQuiz() {
  answered = 0;
  score = 0;
  questions = buildQuestions();
  renderQuiz();
  updateProgress();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

initQuiz();
