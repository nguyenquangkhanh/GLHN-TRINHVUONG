<title>Quiz · Chúa Giêsu — Đấng Cứu Chuộc</title>

<style>
:root {
  --ground:    #1A1529;
  --surface:   #241D3A;
  --surface2:  #2F2650;
  --card:      #F7F0E6;
  --card-ink:  #1E1A2E;
  --card-dim:  #5A5070;
  --text:      #EDE5D4;
  --muted:     #7A6E8F;
  --accent:    #D4A347;
  --accent-lt: #E8C070;
  --jade:      #4EA884;
  --jade-lt:   #7ECDB5;
  --ruby:      #B04040;
  --ruby-lt:   #D08080;
  --border:    rgba(212,163,71,.16);
}

*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }

body {
  background: var(--ground);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  min-height: 100vh;
  padding: 2.5rem 1.25rem 5rem;
  display: flex;
  flex-direction: column;
  align-items: center;
}

#bg-canvas {
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100%;
  z-index: 0;
  pointer-events: none;
  opacity: .05;
}

.wrap {
  width: 100%;
  max-width: 660px;
  position: relative;
  z-index: 1;
}

/* ── header ── */
.pg-header {
  text-align: center;
  margin-bottom: 2.75rem;
}

.pg-eyebrow {
  font-size: .65rem;
  letter-spacing: .26em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: .6rem;
}

.pg-title {
  font-family: Georgia, 'Times New Roman', serif;
  font-size: clamp(1.45rem, 4.5vw, 2.05rem);
  color: var(--accent);
  line-height: 1.22;
  margin-bottom: .35rem;
}

.pg-sub {
  font-size: .8rem;
  color: var(--muted);
}

/* ── bead progress ── */
.beads-wrap {
  margin-bottom: 1.8rem;
}

.beads-meta {
  display: flex;
  justify-content: space-between;
  font-size: .7rem;
  color: var(--muted);
  margin-bottom: .6rem;
}

.beads {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
}

.bead {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: var(--surface2);
  transition: background .3s ease, transform .2s ease;
  flex-shrink: 0;
}

.bead.done    { background: var(--accent); }
.bead.current { background: var(--accent-lt); transform: scale(1.3); }

/* ── score strip ── */
.score-strip {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 1.2rem;
}

.score-disp {
  font-size: .8rem;
  color: var(--muted);
}
.score-disp b { font-size: 1.1rem; color: var(--accent); }

.topic-pill {
  font-size: .62rem;
  letter-spacing: .13em;
  text-transform: uppercase;
  background: rgba(212,163,71,.1);
  color: var(--accent);
  padding: .22rem .85rem;
  border-radius: 20px;
  border: 1px solid var(--border);
}

/* ── question card ── */
.q-card {
  background: var(--card);
  border-radius: 4px;
  padding: 1.8rem 1.75rem 1.55rem;
  margin-bottom: 1rem;
  position: relative;
  overflow: hidden;
  box-shadow:
    0 1px 4px rgba(0,0,0,.3),
    0 8px 28px rgba(0,0,0,.4),
    0 0 0 1px rgba(0,0,0,.15),
    inset 0 1px 0 rgba(255,255,255,.5);
  animation: fadeUp .28s ease both;
}

/* vellum texture: subtle vertical grain */
.q-card::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image: repeating-linear-gradient(
    90deg,
    transparent,
    transparent 6px,
    rgba(0,0,0,.012) 6px,
    rgba(0,0,0,.012) 7px
  );
  pointer-events: none;
}

.q-roman {
  font-family: Georgia, serif;
  font-size: .7rem;
  letter-spacing: .18em;
  color: var(--accent);
  margin-bottom: .6rem;
  opacity: .85;
}

.q-text {
  font-family: Georgia, 'Times New Roman', serif;
  font-size: 1.08rem;
  color: var(--card-ink);
  line-height: 1.62;
  position: relative;
  z-index: 1;
}

/* ── options ── */
.opts {
  display: flex;
  flex-direction: column;
  gap: .55rem;
  animation: fadeUp .3s .05s ease both;
}

.opt-btn {
  background: var(--surface);
  border: 1px solid rgba(255,255,255,.055);
  color: var(--text);
  font-family: inherit;
  font-size: .875rem;
  text-align: left;
  padding: .8rem 1.05rem;
  border-radius: 4px;
  cursor: pointer;
  display: flex;
  align-items: flex-start;
  gap: .7rem;
  line-height: 1.45;
  transition: background .13s, border-color .13s, transform .1s;
}

.opt-btn:hover:not(:disabled) {
  background: var(--surface2);
  border-color: rgba(212,163,71,.3);
  transform: translateX(4px);
}

.opt-btn:focus-visible {
  outline: 2px solid var(--accent);
  outline-offset: 2px;
}

.opt-lbl {
  font-size: .7rem;
  font-weight: 700;
  font-family: Georgia, serif;
  color: var(--accent);
  min-width: 1.1em;
  flex-shrink: 0;
  margin-top: .13em;
}

.opt-btn.is-correct {
  background: rgba(78,168,132,.17);
  border-color: var(--jade);
  color: var(--jade-lt);
}
.opt-btn.is-correct .opt-lbl { color: var(--jade); }

.opt-btn.is-wrong {
  background: rgba(176,64,64,.15);
  border-color: var(--ruby);
  color: var(--ruby-lt);
}
.opt-btn.is-wrong .opt-lbl { color: var(--ruby); }

.opt-btn:disabled { cursor: default; transform: none; }

/* ── feedback ── */
.feedback {
  margin-top: .8rem;
  padding: .75rem 1rem;
  border-radius: 4px;
  font-size: .82rem;
  line-height: 1.5;
  display: none;
}
.feedback.show { display: block; }
.feedback.ok { background: rgba(78,168,132,.12); border: 1px solid rgba(78,168,132,.36); color: #90D4BF; }
.feedback.no { background: rgba(176,64,64,.1);  border: 1px solid rgba(176,64,64,.36); color: #D4A0A0; }

/* ── next button ── */
.next-btn {
  width: 100%;
  margin-top: 1.05rem;
  padding: .85rem 1rem;
  background: var(--accent);
  color: #1A1529;
  font-family: inherit;
  font-size: .875rem;
  font-weight: 700;
  letter-spacing: .04em;
  border: none;
  border-radius: 4px;
  cursor: pointer;
  transition: background .13s, transform .1s;
  display: none;
}
.next-btn.show { display: block; }
.next-btn:hover { background: var(--accent-lt); transform: translateY(-1px); }
.next-btn:focus-visible { outline: 2px solid var(--accent-lt); outline-offset: 2px; }

/* ── results ── */
#results {
  display: none;
  text-align: center;
  padding: 2rem 0;
  animation: fadeUp .35s ease both;
}

.res-score {
  font-family: Georgia, serif;
  font-size: 5.5rem;
  line-height: 1;
  color: var(--accent);
  margin-bottom: .2rem;
}
.res-denom  { font-size: 2.2rem; opacity: .4; }
.res-pct    { font-size: .85rem; color: var(--muted); margin-bottom: 1.5rem; }
.res-msg    { font-family: Georgia, serif; font-size: 1.05rem; color: var(--text); line-height: 1.6; margin-bottom: 2rem; max-width: 440px; margin-left: auto; margin-right: auto; }

.res-divider { width: 60px; height: 2px; background: var(--border); margin: 1.5rem auto 2rem; }

.grade-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 1.25rem 1.5rem;
  margin-bottom: 1.75rem;
  display: inline-block;
  min-width: 220px;
}
.grade-lbl  { font-size: .65rem; text-transform: uppercase; letter-spacing: .14em; color: var(--muted); margin-bottom: .4rem; }
.grade-val  { font-family: Georgia, serif; font-size: 1.6rem; color: var(--accent); }
.grade-sub  { font-size: .75rem; color: var(--muted); margin-top: .2rem; }

.restart-btn {
  padding: .85rem 2.25rem;
  background: transparent;
  color: var(--accent);
  border: 1.5px solid var(--accent);
  border-radius: 4px;
  font-family: inherit;
  font-size: .875rem;
  letter-spacing: .04em;
  cursor: pointer;
  transition: all .14s;
}
.restart-btn:hover { background: var(--accent); color: var(--ground); }
.restart-btn:focus-visible { outline: 2px solid var(--accent-lt); outline-offset: 2px; }

/* ── animation ── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}

@media (prefers-reduced-motion: reduce) {
  *,*::before,*::after { animation-duration: 0ms !important; transition-duration: 0ms !important; }
}

@media (max-width: 480px) {
  body { padding: 2rem .9rem 4rem; }
  .q-card { padding: 1.4rem 1.2rem 1.2rem; }
  .q-text { font-size: 1rem; }
  .res-score { font-size: 4rem; }
  .bead { width: 8px; height: 8px; }
}
</style>

<script>
/* ── noise canvas ── */
(function () {
  const cv = document.getElementById('bg-canvas');
  const cx = cv.getContext('2d');
  function draw() {
    cv.width  = window.innerWidth;
    cv.height = window.innerHeight;
    const img = cx.createImageData(cv.width, cv.height);
    const d   = img.data;
    for (let i = 0; i < d.length; i += 4) {
      const v = Math.floor(Math.random() * 256);
      d[i] = d[i+1] = d[i+2] = v;
      d[i+3] = 255;
    }
    cx.putImageData(img, 0, 0);
  }
  draw();
  window.addEventListener('resize', draw);
}());

/* ── roman numerals ── */
function toRoman(n) {
  const vals = [10,9,5,4,1];
  const syms = ['X','IX','V','IV','I'];
  let r = '';
  for (let i = 0; i < vals.length; i++) {
    while (n >= vals[i]) { r += syms[i]; n -= vals[i]; }
  }
  return r;
}

/* ── state ── */
let cur = 0, score = 0, picked = false;
const TOT = QS.length;

/* ── beads ── */
function renderBeads() {
  const row = document.getElementById('beads-row');
  row.innerHTML = '';
  for (let i = 0; i < TOT; i++) {
    const b = document.createElement('div');
    b.className = 'bead' + (i < cur ? ' done' : i === cur ? ' current' : '');
    row.appendChild(b);
  }
  row.setAttribute('aria-valuenow', cur);
}

/* ── render ── */
function render() {
  const q = QS[cur];

  document.getElementById('bead-label').textContent  = 'Câu ' + toRoman(cur + 1) + ' / ' + toRoman(TOT);
  document.getElementById('bead-score').textContent  = score + ' đúng';
  document.getElementById('score-num').textContent   = score;
  document.getElementById('q-roman').textContent     = toRoman(cur + 1);
  document.getElementById('q-text').textContent      = q.q;

  renderBeads();

  /* options */
  const list = document.getElementById('opts-list');
  list.innerHTML = '';
  q.o.forEach(function (txt, i) {
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    btn.setAttribute('role', 'listitem');
    btn.setAttribute('aria-label', LABELS[i] + ': ' + txt);
    btn.innerHTML = '<span class="opt-lbl">' + LABELS[i] + '</span>' + txt;
    btn.addEventListener('click', function () { pick(i); });
    list.appendChild(btn);
  });

  /* reset */
  const fb = document.getElementById('feedback');
  fb.className   = 'feedback';
  fb.textContent = '';

  const nb = document.getElementById('next-btn');
  nb.className   = 'next-btn';
  nb.textContent = cur < TOT - 1 ? 'Câu tiếp theo →' : 'Xem kết quả →';

  picked = false;

  /* re-animate card */
  const card = document.getElementById('q-card');
  card.style.animation = 'none';
  void card.offsetWidth;
  card.style.animation = '';
}

function pick(i) {
  if (picked) return;
  picked = true;

  const q    = QS[cur];
  const btns = document.querySelectorAll('.opt-btn');
  const ok   = i === q.a;

  btns.forEach(function (b) { b.disabled = true; });
  btns[i].classList.add(ok ? 'is-correct' : 'is-wrong');
  if (!ok) btns[q.a].classList.add('is-correct');

  if (ok) score++;
  document.getElementById('score-num').textContent  = score;
  document.getElementById('bead-score').textContent = score + ' đúng';

  const fb = document.getElementById('feedback');
  if (ok) {
    fb.className   = 'feedback ok show';
    fb.textContent = '✓ Đúng.';
  } else {
    fb.className   = 'feedback no show';
    fb.textContent = '✗ Chưa đúng. Đáp án: ' + LABELS[q.a] + '. ' + q.o[q.a];
  }

  document.getElementById('next-btn').classList.add('show');
}

function onNext() {
  cur++;
  if (cur >= TOT) { showResults(); return; }
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function showResults() {
  document.getElementById('quiz-body').style.display = 'none';

  const pct = Math.round(score / TOT * 100);
  document.getElementById('res-score').innerHTML = score + '<span class="res-denom">/' + TOT + '</span>';
  document.getElementById('res-pct').textContent = pct + '% câu trả lời đúng';

  let msg  = '', gv = '', gs = '';
  if (pct >= 92) {
    msg = 'Xuất sắc. Bạn nắm vững Kitô học — từ Nhập Thể đến Quang Lâm.';
    gv  = 'Xuất sắc'; gs = 'Nắm vững toàn bộ chủ đề';
  } else if (pct >= 80) {
    msg = 'Tốt. Kiến thức vững chắc, chỉ còn vài điểm cần củng cố thêm.';
    gv  = 'Tốt'; gs = 'Hiểu phần lớn nội dung';
  } else if (pct >= 64) {
    msg = 'Khá. Hãy ôn lại phần Nhập Thể, Phục Sinh và Ba Ngôi để hiểu sâu hơn.';
    gv  = 'Khá'; gs = 'Cần ôn thêm một số phần';
  } else {
    msg = 'Cần ôn tập thêm. Đọc lại tài liệu về Đấng Cứu Chuộc trước khi làm lại.';
    gv  = 'Cần cố gắng'; gs = 'Ôn lại toàn bộ nội dung';
  }

  document.getElementById('res-msg').textContent   = msg;
  document.getElementById('grade-val').textContent = gv;
  document.getElementById('grade-sub').textContent = gs;
  document.getElementById('results').style.display = 'block';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function restart() {
  cur = score = 0;
  document.getElementById('results').style.display  = 'none';
  document.getElementById('quiz-body').style.display = 'block';
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

render();
</script>
